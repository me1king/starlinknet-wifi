# FORCE NODE.JS - ROBUST CLOUD BUILD
providers = ["node"]

[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
# Using standard install for maximum compatibility
cmds = ["npm install --prefer-offline --no-audit --progress=false"]

[phases.build]
cmds = ["npx prisma generate", "npm run build"]

[start]
cmd = "bash scripts/start.sh"
