# PRODUCTION-GRADE CLOUD BUILD - FIXING NIX NAMES
providers = ["node"]

[phases.setup]
# Use correct Nix names and simplify to essentials
nixPkgs = ["nodejs_20", "chromium"]

[phases.install]
# SKIP MASSIVE DOWNLOADS: Tell Puppeteer to use the system Chromium
cmds = ["PUPPETEER_SKIP_CHROMIUM_DOWNLOAD=true npm install --prefer-offline --no-audit"]

[phases.build]
cmds = ["npx prisma generate", "npm run build"]

[start]
# Ensure migrations run and then start everything
cmd = "bash scripts/start.sh"

[variables]
# Explicitly point Puppeteer to the system Chromium path on Railway
PUPPETEER_EXECUTABLE_PATH = "/usr/bin/chromium"
PUPPETEER_SKIP_CHROMIUM_DOWNLOAD = "true"
