# PRODUCTION-GRADE CLOUD BUILD - FINAL STABILITY FIX
providers = ["node"]

[phases.setup]
# Include OpenSSL (required for Prisma) and Chromium for WhatsApp
nixPkgs = ["nodejs_20", "chromium", "openssl"]

[phases.install]
# Ensure clean install and skip massive browser downloads
cmds = ["PUPPETEER_SKIP_CHROMIUM_DOWNLOAD=true npm install --prefer-offline --no-audit"]

[phases.build]
# Standard build command that handles Prisma automatically
cmds = ["npm run build"]

[start]
cmd = "bash scripts/start.sh"

[variables]
PUPPETEER_EXECUTABLE_PATH = "/usr/bin/chromium"
PUPPETEER_SKIP_CHROMIUM_DOWNLOAD = "true"
# Help Prisma find its engine
PRISMA_SKIP_POSTINSTALL_GENERATE = "true"
