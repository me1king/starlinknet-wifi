# PRODUCTION-GRADE CLOUD BUILD - STABILITY & CACHE RESET
[phases.setup]
nixPkgs = ["nodejs_20", "chromium", "openssl"]

[phases.install]
cmds = ["npm install --prefer-offline --no-audit"]

[phases.build]
# Generate Prisma client first, then build the Next.js app
cmds = ["npx prisma generate", "npm run build"]

[start]
cmd = "bash scripts/start.sh"

[variables]
# Essential flags for Puppeteer/Chromium on Railway
PUPPETEER_EXECUTABLE_PATH = "/usr/bin/chromium"
PUPPETEER_SKIP_CHROMIUM_DOWNLOAD = "true"
# Stop Prisma from trying to generate twice
PRISMA_SKIP_POSTINSTALL_GENERATE = "true"
# Optimize Next.js build memory
NODE_OPTIONS = "--max-old-space-size=1536"
