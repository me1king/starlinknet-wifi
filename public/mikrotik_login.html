<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Starlinknet.WIFI - Redirecting</title>
    <!-- Android/Google Captive Portal Detection Fix -->
    <meta http-equiv="refresh" content="0; url=https://oil-cinnamon-starfish.ngrok-free.dev?mac=$(mac)&ip=$(ip)&siteId=$(identity)&link-login=$(link-login-only)&link-orig=$(link-orig)">
    <meta http-equiv="pragma" content="no-cache">
    <meta http-equiv="expires" content="-1">
    <script>
        // JS Fallback for redirection if Meta Refresh is blocked by Android Browser
        window.location.href = "https://oil-cinnamon-starfish.ngrok-free.dev?mac=$(mac)&ip=$(ip)&siteId=$(identity)&link-login=$(link-login-only)&link-orig=$(link-orig)";
    </script>
    <style>
        body { background: #0a0c10; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; text-align: center; }
        .loader { border: 4px solid rgba(99, 102, 241, 0.1); border-top: 4px solid #6366f1; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .box { padding: 20px; }
        h2 { font-size: 20px; font-weight: 800; margin-bottom: 10px; }
        p { color: #9ca3af; font-size: 14px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>STARLINKNET.<span style="color:#6366f1">WIFI</span></h2>
        <div class="loader"></div>
        <p>Connecting to secure billing gateway...</p>
        <p style="font-size: 12px; margin-top: 20px;">
            <a href="https://oil-cinnamon-starfish.ngrok-free.dev?mac=$(mac)&ip=$(ip)&siteId=$(identity)&link-login=$(link-login-only)&link-orig=$(link-orig)" style="color:#6366f1; text-decoration:none;">Click here if not redirected</a>
        </p>
    </div>
</body>
</html>
